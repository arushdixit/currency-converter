<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d1a" />
      <stop offset="50%" stop-color="#060913" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>
    
    <!-- Cyber Colors Gradients -->
    <linearGradient id="logo-grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="logo-grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Neon Radial Glow -->
    <radialGradient id="neon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25" />
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#060913" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- App Icon Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Subtle Icon Border -->
  <rect x="2" y="2" width="508" height="508" rx="126" stroke="#1e293b" stroke-width="4" stroke-opacity="0.4" />
  
  <!-- Radial Neon Ambient Glow behind the logo -->
  <circle cx="256" cy="256" r="220" fill="url(#neon-glow)" />

  <!-- Premium Logo centered & scaled -->
  <g transform="translate(96, 96) scale(10)">
    <!-- Orbiting Outer Exchange Loop (Cyan -> Purple) -->
    <!-- Top Right Arc -->
    <path d="M 6 16 A 10 10 0 0 1 24.5 9.5" fill="none" stroke="url(#logo-grad-cyan)" stroke-width="2" stroke-linecap="round" />
    <path d="M 20.5 9.5 H 24.5 V 13.5" fill="none" stroke="url(#logo-grad-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Bottom Left Arc -->
    <path d="M 26 16 A 10 10 0 0 1 7.5 22.5" fill="none" stroke="url(#logo-grad-purple)" stroke-width="2" stroke-linecap="round" />
    <path d="M 11.5 22.5 H 7.5 V 18.5" fill="none" stroke="url(#logo-grad-purple)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Split Center Circular Currency Shield -->
    <g transform="rotate(-45, 16, 16)">
      <!-- Top-Right Half (Cyan) -->
      <path d="M 8.5 15 A 7.5 7.5 0 0 1 23.5 15 Z" fill="url(#logo-grad-cyan)" />
      <!-- Bottom-Left Half (Purple) -->
      <path d="M 23.5 17 A 7.5 7.5 0 0 1 8.5 17 Z" fill="url(#logo-grad-purple)" />
    </g>
    
    <!-- Upright Currency Glyphs in Center -->
    <!-- Dollar Glyph ($) -->
    <path d="M 19 9 V 15.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <path d="M 17.2 10.8 C 17.2 10 17.8 9.5 18.6 9.5 C 19.4 9.5 20 10 20 10.8 C 20 11.6 19.4 12 18.6 12.2 C 17.8 12.4 17.2 12.8 17.2 13.6 C 17.2 14.4 17.8 14.9 18.6 14.9 C 19.4 14.9 20 14.4 20 13.6" 
          stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          
    <!-- Euro Glyph (€) -->
    <path d="M 15 17.8 A 2.2 2.2 0 1 0 15 21.2" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <path d="M 12 19 H 14.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 12 20 H 14.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
  </g>
</svg>
